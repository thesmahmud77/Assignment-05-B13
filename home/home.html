<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="shortcut icon"
      href="../assets/github-logo.png"
      type="image/x-icon"
    />
    <title>Dashboard - Issues Tracker</title>
  </head>
  <body class="bg-slate-50/30 text-slate-700">
    <nav class="w-11/12 mx-auto sticky top-0 bg-white z-50 shadow-sm">
      <div
        class="border-b border-slate-100 px-6 py-4 flex flex-wrap items-center justify-between gap-4"
      >
        <div class="flex items-center gap-3">
          <img src="../assets/github-logo.png" alt="Logo" class="w-7 h-7" />
          <span class="font-extrabold text-slate-900 text-lg tracking-tight"
            >GitHub Issues Hub</span
          >
        </div>

        <div class="flex items-center gap-3">
          <input
            id="search-filter-input"
            type="text"
            placeholder="Search by keyword..."
            class="bg-slate-50 border border-slate-200 text-xs rounded-lg py-2 px-4 w-60 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white transition-all"
          />
          <button
            class="bg-purple-600 hover:bg-purple-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-all cursor-pointer"
          >
            + New Ticket
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-4">
      <div
        class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between"
      >
        <div class="flex gap-2" id="filter-trigger-group">
          <button
            id="filter-all"
            class="btn btn-sm bg-purple-600 text-white border-none px-6 rounded-lg font-medium"
          >
            All Issues
          </button>
          <button
            id="filter-open"
            class="btn btn-sm btn-outline border-slate-200 text-slate-500 px-6 rounded-lg hover:bg-slate-50"
          >
            Active
          </button>
          <button
            id="filter-closed"
            class="btn btn-sm btn-outline border-slate-200 text-slate-500 px-6 rounded-lg hover:bg-slate-50"
          >
            Resolved
          </button>
        </div>
      </div>

      <div
        class="bg-white p-5 rounded-xl border border-slate-100 shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-12 h-12 bg-purple-50 rounded-xl flex items-center justify-center border border-purple-100"
          >
            <img src="../assets/Aperture.png" alt="Aperture" class="w-6 h-6" />
          </div>
          <div>
            <h2 class="text-lg font-black text-slate-800">
              <span id="issues-count">0</span> Total Logs
            </h2>
            <p class="text-xs text-slate-400 mt-0.5">
              Live monitoring of system tasks
            </p>
          </div>
        </div>

        <div class="flex gap-4 text-xs font-semibold text-slate-500">
          <div
            class="flex items-center gap-1.5 bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full"
          >
            <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> Open
          </div>
          <div
            class="flex items-center gap-1.5 bg-purple-50 text-purple-700 px-3 py-1.5 rounded-full"
          >
            <span class="w-2 h-2 bg-purple-500 rounded-full"></span> Closed
          </div>
        </div>
      </div>

      <div
        id="issues-wrapper"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 pt-2"
      ></div>

      <div id="ui-loader" class="flex hidden justify-center items-center py-12">
        <span class="loading loading-spinner loading-lg text-purple-600"></span>
      </div>
    </main>

    <dialog id="details_view_modal" class="modal">
      <div class="modal-box p-0 rounded-2xl overflow-hidden max-w-xl">
        <div id="modal-content-area"></div>
        <div class="p-4 bg-slate-100 flex justify-end">
          <form method="dialog">
            <button
              class="btn btn-sm bg-slate-800 hover:bg-slate-900 text-white border-none rounded-lg px-5"
            >
              Dismiss
            </button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="home.js"></script>
  </body>
</html>
