<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GitHub Issues Tracker - Portal</title>
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="bg-slate-50/50">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div
        class="bg-white p-10 rounded-2xl shadow-md border border-slate-100 w-full max-w-[480px]"
      >
        <div class="text-center mb-8">
          <div class="inline-flex p-3 bg-slate-100 rounded-full mb-4">
            <img
              src="assets/github-logo.png"
              alt="GitHub Logo"
              class="w-12 h-12"
            />
          </div>
          <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">
            GitHub Issues Tracker
          </h1>
          <p class="text-slate-400 text-xs mt-1.5 font-medium">
            Secure Authentication Gateway
          </p>
        </div>

        <div class="space-y-4">
          <div>
            <label
              class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5"
              >Username</label
            >
            <input
              type="text"
              id="app-username"
              placeholder="e.g. admin"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50/50 focus:bg-white transition-all text-sm"
            />
          </div>

          <div>
            <label
              class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5"
              >Password</label
            >
            <input
              type="password"
              id="app-password"
              placeholder="••••••••"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50/50 focus:bg-white transition-all text-sm"
            />
          </div>

          <button
            id="btn-submit-auth"
            type="button"
            class="w-full bg-purple-700 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-100 transition-all cursor-pointer mt-2 text-sm"
          >
            Login
          </button>
        </div>

          </div>
        </div> -->

    </div>

    <script src="signIn.js"></script>
  </body>
</html>
